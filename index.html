<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Clock</title>
  <link href="styles.css" rel="stylesheet" type="text/css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data.min.js"></script>
</head>
<body>
  <div class="container">
<h1> World Clock</h1>


<select id="city">
  <option value="">Select a city...</option>
    <option value="current">Current Location</option>
  <option value="Africa/Dar_es_Salaam">Zanzibar</option>
   <option value="Europe/Madrid">Barcelona</option>
    <option value="America/Montreal">Montreal</option>
</select>

<div id="cities">

<div class="city" id="los-angeles">
<div>
<h2>Los Angeles</h2>
<div class="date"> March 24th 2024</div>
</div>
<div class="time">3:22:15 <small>PM</small></div>
</div>

<div class="city" id="edmonton">
<div>
<h2>Edmonton</h2>
<div class="date"> March 24th 2024</div>
</div>
<div class="time">7:22:15 <small>AM</small></div>
</div>

  </div>

  </div>


  <footer>
  This project was coded by <strong>Rebecca Dani</strong> sourced on <a href="https://github.com/rebecca967/World.Clock" target="_blank"> Github</a>.
</footer>
   <script src="index.js"></script>
  </body>
</html>
